name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JS
        run: |
          npx expo export:embed \
            --platform android \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/ghostletter.jks

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }} \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/ghostletter.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             ghostletter-${{ steps.version.outputs.tag }}.apk
          cp ghostletter-${{ steps.version.outputs.tag }}.apk \
             ghostletter-latest.apk

      - name: Create versioned GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GhostLetter ${{ steps.version.outputs.tag }}"
          body: |
            **Version:** `${{ steps.version.outputs.name }}`
            **Build:** `#${{ steps.version.outputs.code }}`
            **Commit:** `${{ github.sha }}`

            ### Install
            Download `ghostletter-${{ steps.version.outputs.tag }}.apk` below.
            If upgrading from a previous version, Android will update in-place (no data loss).

            ### What's new
            See [commit history](https://github.com/${{ github.repository }}/commits/main) for changes.
          files: ghostletter-${{ steps.version.outputs.tag }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update 'latest' release (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "GhostLetter — Latest (${{ steps.version.outputs.tag }})"
          body: |
            Always points to the most recent build.
            **Current version:** `${{ steps.version.outputs.name }}` (build #${{ steps.version.outputs.code }})

            Direct APK download URL (permanent):
            `https://github.com/${{ github.repository }}/releases/download/latest/ghostletter-latest.apk`
          files: ghostletter-latest.apk
          make_latest: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
